[build]
  command = "npm run build"
  publish = "dist"

# API proxy MUST come first — Netlify processes redirects top-to-bottom
[[redirects]]
  from = "/api/*"
  to = "https://fluffy-doodles-guess.loca.lt/api/:splat"
  status = 200
  force = true
  headers = {Bypass-Tunnel-Reminder = "true"}

# SPA catch-all MUST come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
